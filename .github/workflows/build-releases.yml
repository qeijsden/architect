name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Download Steam SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://partner.steamgames.com/downloads/steamworks_sdk.zip" -OutFile sdk.zip -ErrorAction SilentlyContinue
      - run: npm ci
      - run: npm run build
      - run: npm exec tauri build -- --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/
          retention-days: 7
