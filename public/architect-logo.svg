<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0a0e27"/>
  
  <!-- Pixel Art "A" Logo with Game Blocks -->
  <g transform="translate(60, 30)">
    <!-- Left side of A -->
    <rect x="20" y="60" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="76" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="92" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="108" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="124" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="140" width="16" height="16" fill="#26c6da"/>
    
    <!-- Right side of A -->
    <rect x="52" y="60" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="76" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="92" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="108" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="124" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="140" width="16" height="16" fill="#26c6da"/>
    
    <!-- Top tip of A -->
    <rect x="36" y="28" width="16" height="16" fill="#00e5ff"/>
    
    <!-- Horizontal bar of A -->
    <rect x="20" y="92" width="16" height="16" fill="#ff8a65"/>
    <rect x="36" y="92" width="16" height="16" fill="#ff8a65"/>
    <rect x="52" y="92" width="16" height="16" fill="#ff8a65"/>
    
    <!-- Game blocks decoration -->
    <!-- Top left block -->
    <rect x="-20" y="20" width="12" height="12" fill="#9c27b0"/>
    <rect x="-20" y="20" width="10" height="2" fill="#ba68c8"/>
    
    <!-- Top right block -->
    <rect x="96" y="16" width="12" height="12" fill="#f44336"/>
    <rect x="96" y="16" width="10" height="2" fill="#ef5350"/>
    
    <!-- Bottom left block -->
    <rect x="-16" y="160" width="12" height="12" fill="#aed581"/>
    <rect x="-16" y="160" width="10" height="2" fill="#7cb342"/>
    
    <!-- Bottom right block -->
    <rect x="100" y="164" width="12" height="12" fill="#ffeb3b"/>
    <rect x="100" y="164" width="10" height="2" fill="#fbc02d"/>
  </g>
  
  <!-- Text "ARCHITECT" -->
  <text x="128" y="210" font-family="'Courier New', monospace" font-size="24" font-weight="bold" text-anchor="middle" fill="#00e5ff" letter-spacing="2">ARCHITECT</text>
  
  <!-- Small glow effect -->
  <circle cx="128" cy="85" r="65" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.2"/>
</svg>