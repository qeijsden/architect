<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0a0e27"/>
  
  <!-- Pixel Art "A" Logo -->
  <g transform="translate(60, 35)">
    <!-- Left side of A -->
    <rect x="20" y="60" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="76" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="92" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="108" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="124" width="16" height="16" fill="#26c6da"/>
    <rect x="4" y="140" width="16" height="16" fill="#26c6da"/>
    
    <!-- Right side of A -->
    <rect x="52" y="60" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="76" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="92" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="108" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="124" width="16" height="16" fill="#26c6da"/>
    <rect x="68" y="140" width="16" height="16" fill="#26c6da"/>
    
    <!-- Top tip of A -->
    <rect x="36" y="28" width="16" height="16" fill="#00e5ff"/>
    
    <!-- Horizontal bar of A -->
    <rect x="20" y="92" width="16" height="16" fill="#ff8a65"/>
    <rect x="36" y="92" width="16" height="16" fill="#ff8a65"/>
    <rect x="52" y="92" width="16" height="16" fill="#ff8a65"/>
  </g>
  
  <!-- Glow effect -->
  <circle cx="128" cy="90" r="60" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.3"/>
</svg>